name: Build APK

on:
  push:
    branches: [ main, master, 'claude/*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Verify APK
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "=== APK info ==="
          ls -la "$APK"
          echo ""
          echo "=== File type ==="
          file "$APK"
          echo ""
          echo "=== APK signature verification ==="
          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner" verify --verbose "$APK"
          echo ""
          echo "=== APK manifest dump ==="
          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/aapt2" dump badging "$APK" | head -5
          echo ""
          echo "=== SHA256 ==="
          sha256sum "$APK"

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/lucien-debug.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucien-debug.apk
          path: app/build/outputs/apk/debug/lucien-debug.apk
          compression-level: 0
          retention-days: 30

      - name: Create or update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: Latest Debug Build
          body: |
            Automatically built debug APK from the latest push.

            **Download the APK directly** - no need to extract from a ZIP.

            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
          files: app/build/outputs/apk/debug/lucien-debug.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/lucien-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: lucien-release.apk
          path: app/build/outputs/apk/release/lucien-release.apk
          compression-level: 0
          retention-days: 90
