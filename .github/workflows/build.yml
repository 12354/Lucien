name: Build APK

on:
  push:
    branches: [ main, master, 'claude/*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/daemon
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --build-cache

      - name: Verify APK
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "=== APK info ==="
          ls -la "$APK"
          echo "=== File type ==="
          file "$APK"
          echo "=== APK signature verification ==="
          "$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools/ | tail -1)/apksigner" verify --verbose "$APK"
          echo "=== SHA256 ==="
          sha256sum "$APK"

      - name: Prepare release files
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/lucien-debug.apk
          grep "versionCode" app/build.gradle.kts | head -1 | tr -dc '0-9' > app/build/outputs/apk/debug/version.txt
          echo "Version code: $(cat app/build/outputs/apk/debug/version.txt)"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: lucien-debug.apk
          path: app/build/outputs/apk/debug/lucien-debug.apk
          compression-level: 0
          retention-days: 30

      - name: Delete old release
        run: gh release delete latest-debug --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release with APK and version file
        run: |
          gh release create latest-debug \
            app/build/outputs/apk/debug/lucien-debug.apk \
            app/build/outputs/apk/debug/version.txt \
            --title "Latest Debug Build" \
            --notes "Debug APK from commit ${{ github.sha }} on branch ${{ github.ref_name }}." \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.gradle/daemon
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease --build-cache

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release-unsigned.apk app/build/outputs/apk/release/lucien-release.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: lucien-release.apk
          path: app/build/outputs/apk/release/lucien-release.apk
          compression-level: 0
          retention-days: 90
